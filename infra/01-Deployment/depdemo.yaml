apiVersion: v1
kind: Namespace
metadata:
  name: depdemo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: depdemo-mongo-init
  namespace: depdemo
data:
  01-create-cities.js: |-
    const database = db.getSiblingDB("depdemo-db");

    database.createCollection("cities");

    database.cities.insertMany([
      { id: 1, name: "Alicante", created_at: new Date(), updated_at: null },
      { id: 2, name: "Valencia", created_at: new Date(), updated_at: null },
      { id: 3, name: "Madrid", created_at: new Date(), updated_at: null },
    ]);
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: depdemo
spec:
  clusterIP: None
  selector:
    app: depdemo-mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: depdemo-mongodb
  namespace: depdemo
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: depdemo-mongodb
  template:
    metadata:
      labels:
        app: depdemo-mongodb
    spec:
      containers:
        - name: mongo
          image: mongo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: admin
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: mongo-init
          configMap:
            name: depdemo-mongo-init
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: depdemo-api
  namespace: depdemo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: depdemo-api
  template:
    metadata:
      labels:
        app: depdemo-api
    spec:
      containers:
        - name: api
          image: localhost/depdemo-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3031
          env:
            - name: MONGO_HOST
              value: mongodb
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_DB
              value: depdemo-db
            - name: MONGO_USER
              value: admin
            - name: MONGO_PASSWORD
              value: password
            - name: PORT
              value: "3031"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: depdemo
spec:
  type: LoadBalancer
  selector:
    app: depdemo-api
  ports:
    - name: http
      port: 3031
      targetPort: 3031
      nodePort: 30031
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: depdemo-ui
  namespace: depdemo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: depdemo-ui
  template:
    metadata:
      labels:
        app: depdemo-ui
    spec:
      containers:
        - name: ui
          image: localhost/depdemo-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "150m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: depdemo
spec:
  type: LoadBalancer
  selector:
    app: depdemo-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: depdemo-proc
  namespace: depdemo
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: proc
              image: localhost/depdemo-proc:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: MONGO_HOST
                  value: mongodb
                - name: MONGO_PORT
                  value: "27017"
                - name: MONGO_DB
                  value: depdemo-db
                - name: MONGO_USER
                  value: admin
                - name: MONGO_PASSWORD
                  value: password
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: depdemo-ui-v2
  namespace: depdemo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: depdemo-ui
      slot: green
  template:
    metadata:
      labels:
        app: depdemo-ui
        slot: green
    spec:
      containers:
        - name: ui
          image: localhost/depdemo-ui:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 2
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "150m"
              memory: "256Mi"
